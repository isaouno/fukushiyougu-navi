<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="身長、身体能力、利用環境から福祉用具の候補をカテゴリ別に提案するアプリです。"
    />
    <title>福祉用具おすすめナビ</title>
    <style>
:root {
  color-scheme: light;
  --ink: #18201e;
  --muted: #697571;
  --line: #d7ded9;
  --surface: #f7faf7;
  --panel: #ffffff;
  --green: #1f8a6a;
  --blue: #276b9f;
  --violet: #7a5ca8;
  --orange: #c9792b;
  --red: #b94b4b;
  --shadow: 0 16px 50px rgba(30, 45, 40, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  font-family:
    "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, system-ui, sans-serif;
  background:
    linear-gradient(90deg, rgba(31, 138, 106, 0.08) 1px, transparent 1px),
    linear-gradient(180deg, rgba(39, 107, 159, 0.07) 1px, transparent 1px),
    #eef5f0;
  background-size: 36px 36px;
}

button,
input,
select {
  font: inherit;
}

.app-shell {
  display: grid;
  grid-template-columns: minmax(320px, 410px) minmax(0, 1fr);
  gap: 18px;
  width: min(1440px, 100%);
  min-height: 100vh;
  margin: 0 auto;
  padding: 18px;
}

.input-panel,
.results-panel {
  background: rgba(255, 255, 255, 0.94);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
}

.input-panel {
  position: sticky;
  top: 18px;
  align-self: start;
  padding: 24px;
}

.results-panel {
  min-width: 0;
  padding: 22px;
}

.brand-row,
.summary-strip,
.field-inline,
.check-row,
.card-head,
.tag-row,
.score-row {
  display: flex;
  align-items: center;
}

.brand-row {
  gap: 14px;
  margin-bottom: 24px;
}

.mark {
  width: 52px;
  height: 52px;
  border-radius: 6px;
  background:
    linear-gradient(135deg, transparent 42%, rgba(255, 255, 255, 0.9) 43% 50%, transparent 51%),
    conic-gradient(from 140deg, var(--green), var(--blue), var(--orange), var(--green));
}

.eyebrow {
  margin: 0 0 5px;
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 1.55rem;
  line-height: 1.25;
}

h2 {
  margin-bottom: 0;
  font-size: 1.35rem;
}

h3 {
  margin-bottom: 0;
  font-size: 1.02rem;
  line-height: 1.35;
}

.form-grid {
  display: grid;
  gap: 14px;
}

label {
  display: grid;
  gap: 7px;
  color: #2f3b37;
  font-size: 0.9rem;
  font-weight: 700;
}

input,
select {
  width: 100%;
  min-height: 42px;
  border: 1px solid #bfcac5;
  border-radius: 6px;
  padding: 8px 10px;
  background: #fff;
  color: var(--ink);
}

input:focus,
select:focus,
button:focus-visible {
  outline: 3px solid rgba(31, 138, 106, 0.25);
  outline-offset: 2px;
}

.field-inline {
  gap: 8px;
}

.field-inline input {
  max-width: 130px;
}

.check-row {
  grid-template-columns: 22px 1fr;
  gap: 10px;
  min-height: 40px;
}

.check-row input {
  width: 18px;
  min-height: 18px;
}

.summary-strip {
  justify-content: space-between;
  gap: 18px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

button {
  border: 0;
  border-radius: 6px;
  padding: 10px 14px;
  background: #243b35;
  color: #fff;
  cursor: pointer;
}

.category-list {
  display: grid;
  gap: 18px;
  margin-top: 18px;
}

.category {
  display: grid;
  gap: 12px;
}

.category-title {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  align-items: center;
  gap: 10px;
}

.category-title::before {
  content: "";
  width: 8px;
  height: 38px;
  border-radius: 6px;
  background: var(--category-color, var(--green));
}

.category-title p {
  margin: 2px 0 0;
  color: var(--muted);
  font-size: 0.85rem;
}

.category-title .count {
  color: var(--muted);
  font-size: 0.85rem;
  white-space: nowrap;
}

.cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.card {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 12px;
  min-height: 390px;
  border: 1px solid var(--line);
  border-top: 5px solid var(--category-color, var(--green));
  border-radius: 8px;
  padding: 14px;
  background: var(--panel);
}

.card-head {
  justify-content: space-between;
  gap: 10px;
}

.maker {
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 700;
}

.rank {
  display: inline-grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: var(--category-color, var(--green));
  color: #fff;
  font-weight: 800;
}

.product-photo {
  display: grid;
  place-items: center;
  aspect-ratio: 3 / 2;
  margin: 0;
  overflow: hidden;
  border: 1px solid #dfe6e2;
  border-radius: 6px;
  background: #fff;
}

.product-photo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.specs {
  display: grid;
  gap: 5px;
  margin: 0;
  padding: 0;
  color: #35423e;
  font-size: 0.86rem;
  list-style: none;
}

.reason {
  margin: 0;
  color: #24312d;
  font-size: 0.9rem;
  line-height: 1.65;
}

.tag-row {
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  border-radius: 999px;
  padding: 5px 8px;
  background: color-mix(in srgb, var(--category-color, var(--green)) 14%, #fff);
  color: #24312d;
  font-size: 0.76rem;
  font-weight: 700;
}

.score-row {
  justify-content: space-between;
  gap: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 0.78rem;
}

.score-bar {
  width: 88px;
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: #e6ece8;
}

.score-bar span {
  display: block;
  height: 100%;
  width: var(--score, 50%);
  background: var(--category-color, var(--green));
}

.notice {
  margin: 22px 0 0;
  border-left: 4px solid var(--orange);
  padding: 12px 14px;
  background: #fff8ef;
  color: #4a4038;
  font-size: 0.84rem;
  line-height: 1.7;
}

@media (max-width: 1040px) {
  .app-shell {
    grid-template-columns: 1fr;
  }

  .input-panel {
    position: static;
  }
}

@media (max-width: 760px) {
  .app-shell {
    padding: 10px;
  }

  .input-panel,
  .results-panel {
    padding: 16px;
  }

  .summary-strip {
    align-items: flex-start;
    flex-direction: column;
  }

  .cards {
    grid-template-columns: 1fr;
  }
}

</style>
  </head>
  <body>
    <main class="app-shell">
      <section class="input-panel" aria-labelledby="app-title">
        <div class="brand-row">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1 id="app-title">福祉用具おすすめナビ</h1>
          </div>
        </div>

        <form id="needs-form" class="form-grid">
          <label>
            身長
            <span class="field-inline">
              <input id="height" type="number" min="120" max="200" value="160" />
              <span>cm</span>
            </span>
          </label>

          <label>
            体重
            <span class="field-inline">
              <input id="weight" type="number" min="30" max="180" value="60" />
              <span>kg</span>
            </span>
          </label>

          <label>
            歩行能力
            <select id="mobility">
              <option value="independent">自力歩行できるが不安定</option>
              <option value="assisted">見守り・軽介助が必要</option>
              <option value="wheelchair">車いす中心</option>
              <option value="bedbound">立位・移乗が難しい</option>
            </select>
          </label>

          <label>
            主な利用場所
            <select id="place">
              <option value="indoor">屋内中心</option>
              <option value="outdoor">屋外・外出あり</option>
              <option value="both">屋内外どちらも</option>
            </select>
          </label>

          <label>
            住環境
            <select id="home">
              <option value="narrow">通路や玄関が狭い</option>
              <option value="standard">一般的な住宅</option>
              <option value="barrier">段差が多い</option>
              <option value="facility">施設・広めの空間</option>
            </select>
          </label>

          <label>
            トイレ・排泄
            <select id="toilet">
              <option value="independent">トイレまで移動できる</option>
              <option value="transfer">立ち座り・移乗が不安</option>
              <option value="bed">ベッド上での排泄支援が必要</option>
            </select>
          </label>

          <label>
            入浴
            <select id="bathing">
              <option value="independent">自分で入浴できる</option>
              <option value="bathtub">浴槽またぎ・出入りが不安</option>
              <option value="transfer">洗い場や浴室内の移乗が不安</option>
              <option value="assisted">入浴時に介助が必要</option>
            </select>
          </label>

          <label class="check-row">
            <input id="caregiver" type="checkbox" />
            介助者が常にいる
          </label>

          <label class="check-row">
            <input id="compact" type="checkbox" checked />
            収納しやすさを重視
          </label>
        </form>
      </section>

      <section class="results-panel" aria-live="polite">
        <div class="summary-strip">
          <div>
            <p class="eyebrow">入力条件から自動選定</p>
            <h2>カテゴリ別おすすめ 3選</h2>
          </div>
          <button id="reset-button" type="button">初期条件に戻す</button>
        </div>

        <div id="results" class="category-list">
          <p class="notice">
            選定案を読み込んでいます。数秒待っても表示されない場合は、JavaScriptが無効になっているか、古いファイルを開いている可能性があります。
          </p>
        </div>

        <p class="notice">
          本アプリは福祉用具選定の候補出しを目的とした参考ツールです。実際の選定・利用可否は、利用者の身体状況、住環境、介助体制を確認したうえで、福祉用具専門相談員、ケアマネジャー、医療・リハビリ職などの専門職が判断してください。
        </p>
      </section>
    </main>

const form = document.querySelector("#needs-form");
const results = document.querySelector("#results");
const resetButton = document.querySelector("#reset-button");

const getState = () => ({
  height: Number(document.querySelector("#height").value || 160),
  weight: Number(document.querySelector("#weight").value || 60),
  mobility: document.querySelector("#mobility").value,
  place: document.querySelector("#place").value,
  home: document.querySelector("#home").value,
  toilet: document.querySelector("#toilet").value,
  bathing: document.querySelector("#bathing").value,
  caregiver: document.querySelector("#caregiver").checked,
  compact: document.querySelector("#compact").checked,
});

function scoreProduct(product, state) {
  let score = 42;
  const fit = product.fit || {};

  if (fit.mobility?.includes(state.mobility)) score += 26;
  if (fit.place?.includes(state.place)) score += 14;
  if (state.place === "both" && fit.place?.some((p) => ["indoor", "outdoor", "both"].includes(p))) score += 8;
  if (fit.home?.includes(state.home)) score += 10;
  if (fit.toilet?.includes(state.toilet)) score += 18;
  if (fit.bathing?.includes(state.bathing)) score += 20;
  if (fit.narrow && state.home === "narrow") score += 14;
  if (fit.barrier && state.home === "barrier") score += 18;
  if (fit.compact && state.compact) score += 10;
  if (fit.caregiver && state.caregiver) score += 12;
  if (fit.caregiver && !state.caregiver) score -= 20;
  if (fit.tall && state.height >= 168) score += 8;
  if (fit.armSupport && ["assisted", "wheelchair"].includes(state.mobility)) score += 8;
  if (fit.weightLimit && state.weight > fit.weightLimit) score -= 55;

  if (product.category === "slope" && state.home !== "barrier") score -= 6;
  if (product.category === "toilet" && state.toilet === "bed" && product.tags.includes("ベッド上")) score += 22;
  if (product.category === "lift" && state.mobility === "bedbound") score += 22;
  if (product.category === "lift" && state.bathing !== "independent") score += 12;
  if (product.tags.includes("入浴") && state.bathing === "independent") score -= 8;
  if (product.category === "wheelchair" && state.mobility === "wheelchair") score += 16;
  if (product.category === "walking" && state.mobility === "bedbound") score -= 40;

  return Math.max(0, Math.min(100, score));
}

function render() {
  const state = getState();

  results.innerHTML = categories
    .map((category) => {
      const recommendations = products
        .filter((product) => product.category === category.id)
        .map((product) => ({ ...product, score: scoreProduct(product, state) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

      return `
        <article class="category" style="--category-color:${category.color}">
          <header class="category-title">
            <div>
              <h3>${category.name}</h3>
              <p>${category.note}</p>
            </div>
            <span class="count">上位3件</span>
          </header>
          <div class="cards">
            ${recommendations.map((product, index) => cardTemplate(product, index + 1)).join("")}
          </div>
        </article>
      `;
    })
    .join("");
}

function cardTemplate(product, rank) {
  const imageSrc = productImages[product.name];
  const imageHtml = imageSrc
    ? `<figure class="product-photo"><img src="${imageSrc}" alt="${product.name}" loading="lazy" onerror="this.closest('.product-photo').remove()"></figure>`
    : "";

  return `
    <section class="card">
      <div class="card-head">
        <div>
          <p class="maker">${product.maker}</p>
          <h3>${product.name}</h3>
        </div>
        <span class="rank">${rank}</span>
      </div>
      ${imageHtml}
      <div>
        <ul class="specs">
          ${product.specs.map((spec) => `<li>${spec}</li>`).join("")}
        </ul>
        <p class="reason">${product.reason}</p>
      </div>
      <footer>
        <div class="tag-row">
          ${product.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
        </div>
        <div class="score-row">
          <span>${product.page}</span>
          <span class="score-bar" aria-label="適合度 ${product.score}"><span style="--score:${product.score}%"></span></span>
        </div>
      </footer>
    </section>
  `;
}

form.addEventListener("input", render);
resetButton.addEventListener("click", () => {
  document.querySelector("#height").value = 160;
  document.querySelector("#weight").value = 60;
  document.querySelector("#mobility").value = "independent";
  document.querySelector("#place").value = "indoor";
  document.querySelector("#home").value = "narrow";
  document.querySelector("#toilet").value = "independent";
  document.querySelector("#bathing").value = "independent";
  document.querySelector("#caregiver").checked = false;
  document.querySelector("#compact").checked = true;
  render();
});

render();
